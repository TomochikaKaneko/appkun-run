<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    
    <title>アップ君の筋トレラン - 新記録ジングル版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "DotGothic16", sans-serif; 
            user-select: none;
            overflow: hidden;
        }
        canvas {
            background-color: #7ed6df; 
            border: 4px solid #333;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            max-width: 100%;
        }
        .info {
            margin-top: 10px;
            font-size: 16px;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<audio id="bgm" src="Above_The_Spikes.mp3" loop></audio>

<canvas id="gameCanvas" width="800" height="300"></canvas>
<div class="info">ＰＣ：スペース ｏｒ クリック ／ スマホ：画面どこでもタップでジャンプ！</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'START';
let distance = 0;
let highScore = 0;
let isNewRecord = false;
let currentSpeed = 5;
let bgOffset = 0;

let inputLocked = false;
let gameOverTimer = 0; 

const images = {};
const imgSources = {
    appKun1: 'appkun1.png',
    appKun2: 'appkun2.png',
    bg: 'bg_park.png',
    dumbbell: 'dumbbell.png',
    barbel: 'barbel.png',
    shaker: 'shaker.png'
};

let loadedImages = 0;
const totalImages = Object.keys(imgSources).length;

for (let key in imgSources) {
    images[key] = new Image();
    images[key].src = imgSources[key];
    images[key].onload = () => {
        loadedImages++;
        if (loadedImages === totalImages) {
            gameLoop();
        }
    };
}

const appKun = {
    x: 80,
    y: 186,          
    baseY: 186,
    imgWidth: 64,    
    imgHeight: 64,
    hitboxOffsetX: 12, 
    hitboxOffsetY: 14,
    width: 40,       
    height: 50,
    vy: 0,
    gravity: 0.6,
    jumpForce: -13, 
    isGrounded: true,
    
    animeFrame: 0,     
    animeTimer: 0,     
    landSquat: 0,      
    angle: 0           
};

const OBSTACLE_TYPES = {
    dumbbell: { name: 'dumbbell', width: 40, height: 40, type: 'ground', spawnY: 210 },
    barbel: { name: 'rack-barbel', width: 60, height: 75, type: 'ground', spawnY: 175 },
    shaker: { name: 'shaker', width: 40, height: 25, type: 'air', spawnY: 160 }
};

let obstacles = [];

// ==========================================
// 🔊 プログラムサウンドシステム
// ==========================================
let audioCtx = null;

// ジャンプ効果音
function playJumpSound() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; 
        const now = audioCtx.currentTime;
        osc.frequency.setValueAtTime(180, now); 
        osc.frequency.exponentialRampToValueAtTime(850, now + 0.15); 
        gain.gain.setValueAtTime(0.6, now); 
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.15); 
    } catch(e) { console.log("Audio error:", e); }
}

// ① 記録更新できなかった時用の音楽（残念100%）
function playGameOverSound() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const melody = [
            { f: 523, d: 0.08 }, // ド
            { f: 494, d: 0.08 }, // シ
            { f: 440, d: 0.08 }, // ラ
            { f: 392, d: 0.12 }, // ソ
            { f: 0,   d: 0.04 }, 
            { f: 349, d: 0.16 }, // ファ
            { f: 0,   d: 0.04 }, 
            { f: 349, d: 0.16 }, // ファ
            { f: 0,   d: 0.04 }, 
            { f: 311, d: 0.40 }  // ミ♭
        ];
        let currentOffset = 0;
        melody.forEach((note) => {
            if (note.f > 0) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(note.f, now + currentOffset);
                gain.gain.setValueAtTime(0.4, now + currentOffset);
                gain.gain.linearRampToValueAtTime(0.01, now + currentOffset + note.d);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + currentOffset);
                osc.stop(now + currentOffset + note.d);
            }
            currentOffset += note.d;
        });
    } catch(e) { console.log("Audio error:", e); }
}

// ② ★【新開発】記録更新できた時用の音楽（喜び8：悲しみ2）★
function playNewRecordSound() {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        
        // 前半はテンポよく明るいメロディ（喜び）⇒ 最後だけ不協和音で落ちる（悲しみ）
        const melody = [
            { f: 523, d: 0.08 }, // ド (高)
            { f: 659, d: 0.08 }, // ミ
            { f: 784, d: 0.08 }, // ソ
            { f: 1046,d: 0.16 }, // ド (超高・テッテレー！)
            { f: 0,   d: 0.04 }, // タメ
            { f: 880, d: 0.12 }, // ラ (お祝い)
            { f: 987, d: 0.12 }, // シ (お祝い)
            { f: 1046,d: 0.24 }, // ド (お祝い最高潮)
            { f: 466, d: 0.40 }  // シ♭ (あ、でも死んだわ…のローノート)
        ];
        
        let currentOffset = 0;
        melody.forEach((note) => {
            if (note.f > 0) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                // 新記録時は少しきらびやかな「10%パルス波（なければ通常のsquare）」っぽく高めに
                osc.type = 'square';
                osc.frequency.setValueAtTime(note.f, now + currentOffset);
                
                gain.gain.setValueAtTime(0.35, now + currentOffset);
                gain.gain.linearRampToValueAtTime(0.01, now + currentOffset + note.d);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now + currentOffset);
                osc.stop(now + currentOffset + note.d);
            }
            currentOffset += note.d;
        });
    } catch(e) { console.log("Audio error:", e); }
}

// --- 入力処理システム ---
function processInput(inputType, e) {
    if (inputLocked) return;
    inputLocked = true;
    setTimeout(() => { inputLocked = false; }, 100);

    const bgm = document.getElementById('bgm');

    if (gameState === 'START') {
        initGame();
        gameState = 'PLAYING';
        if (bgm) {
            bgm.currentTime = 0;
            bgm.play().catch(err => console.log("BGM play blocked or missing"));
        }
    } else if (gameState === 'PLAYING') {
        if (appKun.isGrounded) {
            appKun.vy = appKun.jumpForce;
            appKun.isGrounded = false;
            playJumpSound(); 
        }
    } else if (gameState === 'GAMEOVER') {
        if (gameOverTimer > 48) { 
            initGame();
            gameState = 'PLAYING';
            if (bgm) {
                bgm.currentTime = 0;
                bgm.play().catch(err => console.log("BGM play blocked or missing"));
            }
        }
    }
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); processInput('keyboard', e); }
});
window.addEventListener('touchstart', (e) => { 
    if (e.cancelable) e.preventDefault(); processInput('touch', e);
}, { passive: false });
window.addEventListener('mousedown', (e) => {
    if ('ontouchstart' in window && e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
    processInput('mouse', e);
});

function initGame() {
    distance = 0;
    currentSpeed = 5;
    bgOffset = 0;
    isNewRecord = false;
    appKun.y = appKun.baseY; 
    appKun.vy = 0;
    appKun.isGrounded = true;
    appKun.animeFrame = 0;
    appKun.animeTimer = 0;
    appKun.landSquat = 0;
    appKun.angle = 0;
    obstacles = [];
    gameOverTimer = 0; 
    spawnObstacleGroup();
}

function createObstacle(baseX, typeData) {
    let specialMove = 'none';
    let waveAmplitude = 0;
    if (typeData.name === 'shaker' && distance >= 500) {
        specialMove = 'randomWave'; 
        waveAmplitude = 15 + Math.random() * 20; 
    }
    return {
        x: baseX,
        y: typeData.spawnY,
        baseY: typeData.spawnY,
        width: typeData.width,
        height: typeData.height,
        name: typeData.name,
        type: typeData.type,
        waveAngle: Math.random() * Math.PI, 
        waveAmplitude: waveAmplitude, 
        specialMove: specialMove 
    };
}

function spawnObstacleGroup() {
    let currentX = 850;
    if (distance < 1000) {
        let keys = Object.keys(OBSTACLE_TYPES);
        let randKey = keys[Math.floor(Math.random() * keys.length)];
        obstacles.push(createObstacle(currentX, OBSTACLE_TYPES[randKey]));
    } else {
        let comboPattern = Math.floor(Math.random() * 4);
        if (comboPattern === 0) {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.barbel));
            obstacles.push(createObstacle(currentX + 240, OBSTACLE_TYPES.dumbbell));
        } else if (comboPattern === 1) {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.dumbbell));
            obstacles.push(createObstacle(currentX + 160, OBSTACLE_TYPES.shaker));
        } else if (comboPattern === 2) {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.shaker));
            obstacles.push(createObstacle(currentX + 180, OBSTACLE_TYPES.barbel));
        } else {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.dumbbell));
            obstacles.push(createObstacle(currentX + 180, OBSTACLE_TYPES.dumbbell));
        }
    }
}

function checkCollision(player, rect2) {
    const pEx = player.x + player.hitboxOffsetX;
    const pEy = player.y + player.hitboxOffsetY;
    return pEx < rect2.x + rect2.width &&
           pEx + player.width > rect2.x &&
           pEy < rect2.y + rect2.height &&
           pEy + player.height > rect2.y;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'PLAYING') {
        bgOffset = (bgOffset - currentSpeed * 0.5) % 800;
    }
    
    ctx.drawImage(images.bg, bgOffset, 0, 800, 270);
    ctx.drawImage(images.bg, bgOffset + 800, 0, 800, 270);

    ctx.fillStyle = '#1e8449';
    ctx.fillRect(0, 270, canvas.width, 30);

    if (gameState === 'START') {
        ctx.fillStyle = '#2f3542';
        ctx.font = '28px "DotGothic16"'; 
        ctx.textAlign = 'center';
        ctx.fillText('アップ君の筋トレラン', canvas.width / 2, 110);
        ctx.font = '16px "DotGothic16"'; 
        ctx.fillText('どこでも画面を触るかスペースでスタート！', canvas.width / 2, 160);
        ctx.drawImage(images.appKun1, appKun.x, appKun.y, appKun.imgWidth, appKun.imgHeight);

    } else if (gameState === 'PLAYING') {
        let previousDistance = distance;
        distance += currentSpeed * 0.05;
        
        let oldMilestone = Math.floor(previousDistance / 100);
        let newMilestone = Math.floor(distance / 100);

        if (newMilestone > oldMilestone) {
            if (distance < 1000) {
                currentSpeed += 0.8;
            } else {
                let minSpeed = 6.0;
                let maxSpeed = 11.0 + (newMilestone - 10) * 0.5;
                currentSpeed = minSpeed + Math.random() * (maxSpeed - minSpeed); 
            }
        }

        appKun.vy += appKun.gravity;
        appKun.y += appKun.vy;

        if (appKun.y >= appKun.baseY) {
            if (!appKun.isGrounded) {
                appKun.landSquat = 5; 
            }
            appKun.y = appKun.baseY;
            appKun.vy = 0;
            appKun.isGrounded = true;
            appKun.angle = 0; 
            
            appKun.animeTimer += currentSpeed;
            if (appKun.animeTimer > 60) {
                appKun.animeFrame = appKun.animeFrame === 0 ? 1 : 0;
                appKun.animeTimer = 0;
            }
        } else {
            appKun.animeFrame = 1; 
            appKun.angle = appKun.vy * 0.02; 
        }

        if (appKun.landSquat > 0) {
            appKun.landSquat -= 0.4;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= currentSpeed; 

            if (obs.specialMove === 'randomWave') {
                obs.waveAngle += 0.07; 
                let offset = Math.sin(obs.waveAngle) * obs.waveAmplitude;
                obs.y = Math.max(120, Math.min(200, obs.baseY + offset)); 
            }

            if (checkCollision(appKun, obs)) {
                gameState = 'GAMEOVER';
                
                const bgm = document.getElementById('bgm');
                if (bgm) bgm.pause();
                
                // ★【大修正】ここで新記録かどうかを判定してジングルを切り替える！
                if (Math.floor(distance) > highScore) {
                    highScore = Math.floor(distance);
                    isNewRecord = true;
                    playNewRecordSound(); // 喜び8 : 悲しみ2 ジングル
                } else {
                    isNewRecord = false;
                    playGameOverSound(); // 通常のガッカリジングル
                }
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
            }
        }

        if (obstacles.length === 0) {
            spawnObstacleGroup();
        }

        obstacles.forEach(obs => {
            if (obs.name === 'dumbbell') {
                ctx.drawImage(images.dumbbell, obs.x, obs.y, obs.width, obs.height);
            } else if (obs.name === 'rack-barbel') {
                ctx.drawImage(images.barbel, obs.x, obs.y, obs.width, obs.height);
            } else if (obs.name === 'shaker') {
                ctx.drawImage(images.shaker, obs.x, obs.y, obs.width, obs.height);
            }
        });

        ctx.save();
        let drawY = appKun.y + appKun.landSquat;
        ctx.translate(appKun.x + appKun.imgWidth / 2, drawY + appKun.imgHeight / 2);
        ctx.rotate(appKun.angle);
        if (appKun.landSquat > 0) {
            ctx.scale(1.1, 1.0 - (appKun.landSquat * 0.02)); 
        }
        let currentAppImage = appKun.animeFrame === 0 ? images.appKun1 : images.appKun2;
        ctx.drawImage(currentAppImage, -appKun.imgWidth / 2, -appKun.imgHeight / 2, appKun.imgWidth, appKun.imgHeight);
        ctx.restore();

        ctx.fillStyle = '#2f3542';
        ctx.font = '20px "DotGothic16"'; 
        ctx.textAlign = 'left';
        ctx.fillText(`距離: ${Math.floor(distance)} m`, 20, 35);
        ctx.font = '15px "DotGothic16"'; 
        ctx.fillText(`最高記録: ${highScore} m`, 20, 65);

    } else if (gameState === 'GAMEOVER') {
        gameOverTimer++;

        obstacles.forEach(obs => {
            if (obs.name === 'dumbbell') ctx.drawImage(images.dumbbell, obs.x, obs.y, obs.width, obs.height);
            else if (obs.name === 'rack-barbel') ctx.drawImage(images.barbel, obs.x, obs.y, obs.width, obs.height);
            else if (obs.name === 'shaker') ctx.drawImage(images.shaker, obs.x, obs.y, obs.width, obs.height);
        });
        ctx.drawImage(images.appKun1, appKun.x, appKun.y, appKun.imgWidth, appKun.imgHeight);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ff4757';
        ctx.font = '36px "DotGothic16"'; 
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, 100);

        ctx.fillStyle = '#fff';
        ctx.font = '22px "DotGothic16"'; 
        ctx.fillText(`記録: ${Math.floor(distance)} m`, canvas.width / 2, 145);

        if (isNewRecord && highScore > 0) {
            ctx.fillStyle = '#eccc68';
            ctx.font = '22px "DotGothic16"'; 
            ctx.fillText('★ 新記録達成！ナイスバルク！ ★', canvas.width / 2, 195);
        } else {
            ctx.fillStyle = '#f1f2f6';
            ctx.font = '16px "DotGothic16"'; 
            ctx.fillText(`（歴代最高: ${highScore} m）`, canvas.width / 2, 185);
        }

        if (gameOverTimer > 48) {
            ctx.fillStyle = '#fff';
            ctx.font = '16px "DotGothic16"'; 
            ctx.fillText('どこでも画面を触るかスペースで再挑戦', canvas.width / 2, 240);
        }
    }

    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
