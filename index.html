<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アップ君の筋トレラン</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            overflow: hidden;
        }
        canvas {
            background-color: #7ed6df; 
            border: 4px solid #333;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            max-width: 100%;
        }
        .info {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="300"></canvas>
<div class="info">PC: スペース or クリック / スマホ: 画面どこでもタップでジャンプ！</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'START';
let distance = 0;
let highScore = 0;
let isNewRecord = false;
let currentSpeed = 5;
let bgOffset = 0;

// 【追加】二重入力を完全に防止するためのフラグ
let inputLocked = false;

const images = {};
const imgSources = {
    appKun1: 'appkun1.png',
    appKun2: 'appkun2.png',
    bg: 'bg_park.png',
    dumbbell: 'dumbbell.png',
    barbel: 'barbel.png',
    shaker: 'shaker.png'
};

let loadedImages = 0;
const totalImages = Object.keys(imgSources).length;

for (let key in imgSources) {
    images[key] = new Image();
    images[key].src = imgSources[key];
    images[key].onload = () => {
        loadedImages++;
        if (loadedImages === totalImages) {
            gameLoop();
        }
    };
}

const appKun = {
    x: 80,
    y: 186,          
    baseY: 186,
    imgWidth: 64,    
    imgHeight: 64,
    hitboxOffsetX: 12, 
    hitboxOffsetY: 14,
    width: 40,       
    height: 50,
    vy: 0,
    gravity: 0.6,
    jumpForce: -13, 
    isGrounded: true,
    
    animeFrame: 0,     
    animeTimer: 0,     
    landSquat: 0,      
    angle: 0           
};

const OBSTACLE_TYPES = {
    dumbbell: { name: 'dumbbell', width: 40, height: 40, type: 'ground', spawnY: 210 },
    barbel: { name: 'rack-barbel', width: 60, height: 75, type: 'ground', spawnY: 175 },
    shaker: { name: 'shaker', width: 40, height: 25, type: 'air', spawnY: 160 }
};

let obstacles = [];

// ==========================================
// 🛠️ 【根本修正】すべての入力を1つの関数に統合して完全制御
// ==========================================

function processInput(inputType, e) {
    // すでに他の入力が処理中の場合は、この瞬間のイベントを完全に無視する
    if (inputLocked) return;
    
    // ロックをかける
    inputLocked = true;
    
    // 0.1秒後にロックを解除する（これでキー押しっぱなしや、クリックの同時発生を防ぐ）
    setTimeout(() => { inputLocked = false; }, 100);

    if (gameState === 'START' || gameState === 'GAMEOVER') {
        initGame();
        gameState = 'PLAYING';
    } else if (gameState === 'PLAYING') {
        if (appKun.isGrounded) {
            appKun.vy = appKun.jumpForce;
            appKun.isGrounded = false;
        }
    }
}

// 1. キーボード（スペースキー）
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { 
        e.preventDefault(); 
        processInput('keyboard', e); 
    }
});

// 2. スマホ・タブレット（タッチ）
window.addEventListener('touchstart', (e) => { 
    if (e.cancelable) e.preventDefault(); 
    processInput('touch', e);
}, { passive: false });

// 3. パソコン（マウスの画面どこでもクリック）
window.addEventListener('mousedown', (e) => {
    // スマホの「タッチによるエミュレートクリック」はここで除外する
    if ('ontouchstart' in window && e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) {
        return;
    }
    processInput('mouse', e);
});


function initGame() {
    distance = 0;
    currentSpeed = 5;
    bgOffset = 0;
    isNewRecord = false;
    appKun.y = appKun.baseY; 
    appKun.vy = 0;
    appKun.isGrounded = true;
    appKun.animeFrame = 0;
    appKun.animeTimer = 0;
    appKun.landSquat = 0;
    appKun.angle = 0;
    obstacles = [];
    spawnObstacleGroup();
}

function createObstacle(baseX, typeData) {
    let specialMove = 'none';
    let waveAmplitude = 0;

    if (typeData.name === 'shaker' && distance >= 500) {
        specialMove = 'randomWave'; 
        waveAmplitude = 15 + Math.random() * 20; 
    }

    return {
        x: baseX,
        y: typeData.spawnY,
        baseY: typeData.spawnY,
        width: typeData.width,
        height: typeData.height,
        name: typeData.name,
        type: typeData.type,
        waveAngle: Math.random() * Math.PI, 
        waveAmplitude: waveAmplitude, 
        specialMove: specialMove 
    };
}

function spawnObstacleGroup() {
    let currentX = 850;

    if (distance < 1000) {
        let keys = Object.keys(OBSTACLE_TYPES);
        let randKey = keys[Math.floor(Math.random() * keys.length)];
        obstacles.push(createObstacle(currentX, OBSTACLE_TYPES[randKey]));
    } else {
        let comboPattern = Math.floor(Math.random() * 4);
        
        if (comboPattern === 0) {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.barbel));
            obstacles.push(createObstacle(currentX + 240, OBSTACLE_TYPES.dumbbell));
        } else if (comboPattern === 1) {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.dumbbell));
            obstacles.push(createObstacle(currentX + 160, OBSTACLE_TYPES.shaker));
        } else if (comboPattern === 2) {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.shaker));
            obstacles.push(createObstacle(currentX + 180, OBSTACLE_TYPES.barbel));
        } else {
            obstacles.push(createObstacle(currentX, OBSTACLE_TYPES.dumbbell));
            obstacles.push(createObstacle(currentX + 180, OBSTACLE_TYPES.dumbbell));
        }
    }
}

function checkCollision(player, rect2) {
    const pEx = player.x + player.hitboxOffsetX;
    const pEy = player.y + player.hitboxOffsetY;
    return pEx < rect2.x + rect2.width &&
           pEx + player.width > rect2.x &&
           pEy < rect2.y + rect2.height &&
           pEy + player.height > rect2.y;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'PLAYING') {
        bgOffset = (bgOffset - currentSpeed * 0.5) % 800;
    }
    
    ctx.drawImage(images.bg, bgOffset, 0, 800, 270);
    ctx.drawImage(images.bg, bgOffset + 800, 0, 800, 270);

    ctx.fillStyle = '#1e8449';
    ctx.fillRect(0, 270, canvas.width, 30);

    if (gameState === 'START') {
        ctx.fillStyle = '#2f3542';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('アップ君の筋トレラン -マゾ仕様-', canvas.width / 2, 110);
        ctx.font = '18px sans-serif';
        ctx.fillText('どこでも画面を触るかスペースでスタート！', canvas.width / 2, 160);

        ctx.drawImage(images.appKun1, appKun.x, appKun.y, appKun.imgWidth, appKun.imgHeight);

    } else if (gameState === 'PLAYING') {
        let previousDistance = distance;
        distance += currentSpeed * 0.05;
        
        let oldMilestone = Math.floor(previousDistance / 100);
        let newMilestone = Math.floor(distance / 100);

        if (newMilestone > oldMilestone) {
            if (distance < 1000) {
                currentSpeed += 0.8;
            } else {
                let minSpeed = 6.0;
                let maxSpeed = 11.0 + (newMilestone - 10) * 0.5;
                currentSpeed = minSpeed + Math.random() * (maxSpeed - minSpeed); 
            }
        }

        appKun.vy += appKun.gravity;
        appKun.y += appKun.vy;

        if (appKun.y >= appKun.baseY) {
            if (!appKun.isGrounded) {
                appKun.landSquat = 5; 
            }
            appKun.y = appKun.baseY;
            appKun.vy = 0;
            appKun.isGrounded = true;
            appKun.angle = 0; 
            
            appKun.animeTimer += currentSpeed;
            if (appKun.animeTimer > 60) {
                appKun.animeFrame = appKun.animeFrame === 0 ? 1 : 0;
                appKun.animeTimer = 0;
            }
        } else {
            appKun.animeFrame = 1; 
            appKun.angle = appKun.vy * 0.02; 
        }

        if (appKun.landSquat > 0) {
            appKun.landSquat -= 0.4;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= currentSpeed; 

            if (obs.specialMove === 'randomWave') {
                obs.waveAngle += 0.07; 
                let offset = Math.sin(obs.waveAngle) * obs.waveAmplitude;
                obs.y = Math.max(120, Math.min(200, obs.baseY + offset)); 
            }

            if (checkCollision(appKun, obs)) {
                gameState = 'GAMEOVER';
                if (Math.floor(distance) > highScore) {
                    highScore = Math.floor(distance);
                    isNewRecord = true;
                }
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
            }
        }

        if (obstacles.length === 0) {
            spawnObstacleGroup();
        }

        obstacles.forEach(obs => {
            if (obs.name === 'dumbbell') {
                ctx.drawImage(images.dumbbell, obs.x, obs.y, obs.width, obs.height);
            } else if (obs.name === 'rack-barbel') {
                ctx.drawImage(images.barbel, obs.x, obs.y, obs.width, obs.height);
            } else if (obs.name === 'shaker') {
                ctx.drawImage(images.shaker, obs.x, obs.y, obs.width, obs.height);
            }
        });

        ctx.save();
        let drawY = appKun.y + appKun.landSquat;
        ctx.translate(appKun.x + appKun.imgWidth / 2, drawY + appKun.imgHeight / 2);
        ctx.rotate(appKun.angle);

        if (appKun.landSquat > 0) {
            ctx.scale(1.1, 1.0 - (appKun.landSquat * 0.02)); 
        }

        let currentAppImage = appKun.animeFrame === 0 ? images.appKun1 : images.appKun2;
        ctx.drawImage(currentAppImage, -appKun.imgWidth / 2, -appKun.imgHeight / 2, appKun.imgWidth, appKun.imgHeight);
        ctx.restore();

        // UI表示
        ctx.fillStyle = '#2f3542';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`距離: ${Math.floor(distance)} m`, 20, 35);
        ctx.font = '16px sans-serif';
        ctx.fillText(`最高記録: ${highScore} m`, 20, 65);

    } else if (gameState === 'GAMEOVER') {
        obstacles.forEach(obs => {
            if (obs.name === 'dumbbell') ctx.drawImage(images.dumbbell, obs.x, obs.y, obs.width, obs.height);
            else if (obs.name === 'rack-barbel') ctx.drawImage(images.barbel, obs.x, obs.y, obs.width, obs.height);
            else if (obs.name === 'shaker') ctx.drawImage(images.shaker, obs.x, obs.y, obs.width, obs.height);
        });
        ctx.drawImage(images.appKun1, appKun.x, appKun.y, appKun.imgWidth, appKun.imgHeight);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ff4757';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, 100);

        ctx.fillStyle = '#fff';
        ctx.font = '22px sans-serif';
        ctx.fillText(`記録: ${Math.floor(distance)} m`, canvas.width / 2, 145);

        if (isNewRecord && highScore > 0) {
            ctx.fillStyle = '#eccc68';
            ctx.font = 'bold 26px sans-serif';
            ctx.fillText('★ 新記録達成！ナイスバルク！ ★', canvas.width / 2, 195);
        } else {
            ctx.fillStyle = '#f1f2f6';
            ctx.font = '16px sans-serif';
            ctx.fillText(`（歴代最高: ${highScore} m）`, canvas.width / 2, 185);
        }

        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        ctx.fillText('どこでも画面を触るかスペースで再挑戦', canvas.width / 2, 240);
    }

    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
